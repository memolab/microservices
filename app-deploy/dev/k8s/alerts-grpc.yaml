apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: grpc-combined-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: gRPC-Service-Health
    rules:
    # 1. ALERT: Service is completely offline
    - alert: GRPCServiceDown
      expr: up{monitoring="enabled"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Instance {{ $labels.instance }} down"
        description: "The gRPC service {{ $labels.service }} has been unreachable for more than 1 minute."
    # 2. ALERT: High Error Rate (> 5%)
    - alert: HighgRPCErrorRate
      expr: |
        sum(rate(grpc_server_handled_total{grpc_code!="OK"}[2m])) by (service)
        /
        sum(rate(grpc_server_handled_total[2m])) by (service) > 0.05
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "High error rate on {{ $labels.service }}"
        description: "Service {{ $labels.service }} is failing more than 5% of requests (current: {{ $value | humanizePercentage }})."
    # 3. ALERT: Slow Response Times (p99 > 1s)
    - alert: GRPCLatencyWarning
      expr: |
        histogram_quantile(0.99, sum(rate(grpc_server_handling_seconds_bucket[5m])) by (le, service)) > 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Slow gRPC responses on {{ $labels.service }}"
        description: "99th percentile latency is over 1s for service {{ $labels.service }} (current: {{ $value | humanizeDuration }})."
