apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  labels:
    app: jaeger
spec:
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.76.0
          ports:
            - containerPort: 16686 # UI
            - containerPort: 4317 # Collector GRPC
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            - name: "JAEGER_SERVICE_NAME"
              value: "jaeger"
            - name: "OTEL_SERVICE_NAME"
              value: "otel-jaeger"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
spec:
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
    - name: collector
      port: 4317
      targetPort: 4317
  type: ClusterIP
